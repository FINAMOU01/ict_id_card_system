{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - ICT University</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/script.js' %}"></script>
</head>
<body>
    <div class="registration-form" style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);">
        <div style="text-align: center; margin-bottom: 30px;">
            <img src="{% static 'images/logo.png' %}" alt="ICT University Logo" style="width: 80px; height: auto; margin-bottom: 15px;">
            <h1 style="color: #1a365d; margin: 0; font-size: 2.2em;">Student Registration</h1>
            <p style="color: #718096; margin: 5px 0 0 0;">Create your student ID card</p>
        </div>

        {% if error %}
        <div style="color: #e53e3e; margin-bottom: 20px; padding: 15px; background-color: #fed7d7; border: 1px solid #fc8181; border-radius: 8px; text-align: center;">
            <strong>Error:</strong> {{ error }}
        </div>
        {% endif %}

        <form method="post" enctype="multipart/form-data" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            {% csrf_token %}

            <div class="form-group" style="grid-column: 1 / -1;">
                <label for="full_name" style="display: block; margin-bottom: 8px; color: #2d3748; font-weight: 600;">Full Name:</label>
                <input type="text" id="full_name" name="full_name" required style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; transition: border-color 0.2s; box-sizing: border-box;">
            </div>

            <div class="form-group">
                <label for="gender" style="display: block; margin-bottom: 8px; color: #2d3748; font-weight: 600;">Gender:</label>
                <select id="gender" name="gender" required style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; background: white; box-sizing: border-box;">
                    <option value="">Select Gender</option>
                    <option value="M">Male</option>
                    <option value="F">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label for="matricule" style="display: block; margin-bottom: 8px; color: #2d3748; font-weight: 600;">Matricule:</label>
                <input type="text" id="matricule" name="matricule" required style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
            </div>

            <div class="form-group">
                <label for="faculty" style="display: block; margin-bottom: 8px; color: #2d3748; font-weight: 600;">Faculty:</label>
                <input type="text" id="faculty" name="faculty" required style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
            </div>

            <div class="form-group">
                <label for="department_program" style="display: block; margin-bottom: 8px; color: #2d3748; font-weight: 600;">Department / Program:</label>
                <input type="text" id="department_program" name="department_program" required style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
            </div>

            <div class="form-group">
                <label for="date_of_birth" style="display: block; margin-bottom: 8px; color: #2d3748; font-weight: 600;">Date of Birth:</label>
                <input type="date" id="date_of_birth" name="date_of_birth" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box;">
            </div>

            <div class="form-group" style="grid-column: 1 / -1;">
                <label for="photo" style="display: block; margin-bottom: 8px; color: #2d3748; font-weight: 600;">Student Photo:</label>
                <input type="file" id="photo" name="photo" accept="image/*" required style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; background: #f8fafc; box-sizing: border-box;">
                <small style="color: #718096; display: block; margin-top: 5px;">Upload a passport-size photo (JPEG, PNG)</small>
            </div>

            <div style="grid-column: 1 / -1; text-align: center; margin-top: 20px;">
                <button type="submit" class="submit-btn" style="background: linear-gradient(135deg, #d97706, #b45309); color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(217, 119, 6, 0.3); transition: transform 0.2s;">Register Student</button>
            </div>
        </form>

        <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0;">
            <a href="{% url 'welcome' %}" style="color: #1a365d; text-decoration: none; font-weight: 500;">← Back to Home</a>
        </div>
    </div>
</body>
</html>
